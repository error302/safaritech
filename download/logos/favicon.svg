<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Favicon — simplified compass mark for 16x16 to 64x64 -->
  <defs>
    <linearGradient id="favEmerald" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F5132"/>
      <stop offset="100%" stop-color="#0A3D24"/>
    </linearGradient>
    <linearGradient id="favBrass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4A017"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
  </defs>

  <circle cx="32" cy="32" r="28" fill="url(#favEmerald)"/>

  <!-- North (brass) -->
  <path d="M 32 8 L 37 28 L 32 32 Z" fill="url(#favBrass)"/>
  <!-- South -->
  <path d="M 32 56 L 27 36 L 32 32 Z" fill="#FAFAF8" opacity="0.9"/>
  <!-- East -->
  <path d="M 56 32 L 36 27 L 32 32 Z" fill="#FAFAF8" opacity="0.9"/>
  <!-- West -->
  <path d="M 8 32 L 28 37 L 32 32 Z" fill="#FAFAF8" opacity="0.9"/>

  <!-- Center -->
  <circle cx="32" cy="32" r="5" fill="url(#favBrass)"/>
  <circle cx="32" cy="32" r="2.5" fill="url(#favEmerald)"/>
</svg>
